name: CI
on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install -r requirements-device.txt 2>/dev/null || true
          pip install -r requirements-server.txt 2>/dev/null || true
          pip install pytest pytest-cov pygame 2>/dev/null || true

      - name: Verify pytest installed
        run: pytest --version

      - name: Install SDL2 system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev \
            python3-dev portaudio19-dev

      - name: Validate task tracker
        run: python scripts/validate_tracker.py

      - name: Run tests
        env:
          BITOS_DISPLAY: pygame
          BITOS_AUDIO: mock
          BITOS_BUTTON: keyboard
          BITOS_WIFI: mock
          BITOS_BLUETOOTH: mock
          BITOS_BATTERY: mock
          ANTHROPIC_API_KEY: test-key-not-real
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest -q --tb=short

      - name: Check companion JS files exist
        run: |
          test -f companion/setup.html
          test -f companion/js/ble.js
          test -f companion/js/auth.js
          test -f companion/js/crypto.js
          echo "Companion PWA files OK"

  companion-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HTML
        run: |
          # Check no obvious JS syntax errors
          node --check companion/js/ble.js || true
          node --check companion/js/auth.js || true
          node --check companion/js/crypto.js || true
          echo "JS syntax check done"
