services:
  - type: web
    name: bitos-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd server && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MODEL_NAME
        value: claude-sonnet-4-6

  - type: web
    name: bitos-preview
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python web_preview/server.py
    envVars:
      - key: BITOS_SERVER_URL
        value: https://bitos-server.onrender.com
      - key: PORT
        value: "5001"
