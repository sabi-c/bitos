<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BITOS Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            color: #666;
        }
        .device-frame {
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 24px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .screen {
            width: 480px;
            height: 560px;
            background: #000;
            border: 2px solid #222;
            image-rendering: pixelated;
        }
        .screen img {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .label {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .status {
            font-size: 8px;
            color: #444;
            margin-top: 8px;
        }
        @media (max-width: 520px) {
            .screen { width: 240px; height: 280px; }
            .device-frame { padding: 12px 8px; }
        }
    </style>
</head>
<body>
    <div class="device-frame">
        <div class="label">BITOS</div>
        <div class="screen">
            <img src="/stream" alt="BITOS Live Preview">
        </div>
        <div class="status">live preview · 30fps</div>
    </div>
</body>
</html>
