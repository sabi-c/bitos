<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BITOS</title>
</head>
<body style="background:#000">
  <script>
    // Always check server health — go to dashboard if reachable, setup if not
    const server = sessionStorage.getItem('bitos_server')
      || `http://${location.hostname}:8000`;
    fetch(`${server}/health`, { signal: AbortSignal.timeout(3000) })
      .then(r => {
        if (r.ok) {
          localStorage.setItem('bitos_configured', '1');
          location.replace('dashboard.html');
        } else {
          throw new Error();
        }
      })
      .catch(() => {
        // If previously configured, still go to dashboard (may come back online)
        if (localStorage.getItem('bitos_configured')) {
          location.replace('dashboard.html');
        } else {
          location.replace('setup.html');
        }
      });
  </script>
</body>
</html>
