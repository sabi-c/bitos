<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BITOS Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000; color: #fff;
      font-family: monospace; font-size: 14px;
      display: flex; flex-direction: column;
      align-items: center; padding: 32px 16px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; letter-spacing: .1em; margin-bottom: 8px; }
    .sub { color: #555; font-size: 11px; margin-bottom: 32px; }
    .card { border: 2px solid #fff; padding: 20px; width: 100%; max-width: 360px; margin-bottom: 16px; }
    .card h2 { font-size: 12px; letter-spacing: .08em; margin-bottom: 16px; color: #aaa; }
    input { width: 100%; background: #111; border: 2px solid #444; color: #fff; font-family: monospace; font-size: 14px; padding: 10px; margin-bottom: 10px; outline: none; }
    button { width: 100%; background: #fff; color: #000; border: none; font-family: monospace; font-size: 14px; font-weight: bold; padding: 12px; cursor: pointer; letter-spacing: .06em; }
    .status { font-size: 11px; letter-spacing: .06em; color: #888; padding: 8px 0; min-height: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>◎ BITOS</h1>
  <div class="sub">DEVICE SETTINGS</div>

  <div class="card">
    <h2>INTEGRATION STATUS</h2>
    <div id="integrations-loading" class="status">Loading...</div>
    <div id="integrations-list" style="display:none"></div>
    <button onclick="refreshStatus()">REFRESH</button>
  </div>

  <div class="card">
    <h2>iMESSAGE — BLUEBUBBLES</h2>
    <div class="status" id="bb-status">—</div>
    <input type="text" id="bb-url" placeholder="BlueBubbles URL (e.g. http://mac.local:1234)">
    <input type="password" id="bb-password" placeholder="BlueBubbles password">
    <button onclick="saveBlueBubbles()">SAVE & TEST</button>
    <div class="status" id="bb-save-status"></div>
  </div>

  <div class="card">
    <h2>TASKS — VIKUNJA</h2>
    <div class="status" id="vk-status">—</div>
    <input type="text" id="vk-url" placeholder="Vikunja URL (e.g. http://mac.local:3456/api/v1)">
    <input type="password" id="vk-token" placeholder="Vikunja API token">
    <button onclick="saveVikunja()">SAVE & TEST</button>
    <div class="status" id="vk-save-status"></div>
  </div>

  <div class="card">
    <h2>DEVICE UPDATE</h2>
    <div id="version-info" class="status">Checking...</div>
    <div id="update-available" style="display:none">
      <div class="status" id="update-msg" style="color:#4f4"></div>
      <button id="update-button" onclick="startUpdate('both')">
        UPDATE DEVICE + SERVER
      </button>
      <div class="status" id="update-status"></div>
    </div>
    <div id="up-to-date" style="display:none">
      <div class="status" style="color:#4f4">✓ UP TO DATE</div>
      <button class="secondary" onclick="checkVersion()">
        CHECK AGAIN
      </button>
    </div>
  </div>

  <div class="card">
    <h2>DEVICE INFO</h2>
    <div id="device-info" class="status">Loading...</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script>
    const params = new URLSearchParams(location.search);
    const SERVER = params.get('server')
      || sessionStorage.getItem('bitos_server')
      || 'http://bitos:8000';
    if (params.get('server')) {
      sessionStorage.setItem('bitos_server', params.get('server'));
    }

    async function refreshStatus() {
      try {
        const r = await fetch(`${SERVER}/status/integrations`);
        const data = await r.json();
        renderIntegrations(data);
      } catch (e) {
        document.getElementById('integrations-loading').textContent = '✗ Cannot reach device server';
      }
    }

    function renderIntegrations(data) {
      const list = document.getElementById('integrations-list');
      list.innerHTML = '';
      document.getElementById('integrations-loading').style.display = 'none';
      list.style.display = 'block';

      for (const [name, info] of Object.entries(data)) {
        const badge = info.status === 'online' ? '✓' : info.status === 'mock' ? '◌' : info.status === 'config' ? '⚙' : '✗';
        const color = info.status === 'online' ? '#4f4' : info.status === 'mock' ? '#aaa' : '#f44';
        list.innerHTML += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222"><span style="font-size:12px">${name.toUpperCase()}</span><span style="color:${color};font-size:12px">${badge} ${info.status.toUpperCase()}</span></div>`;
      }
      document.getElementById('bb-status').textContent = (data.imessage?.status || 'unknown').toUpperCase();
      document.getElementById('vk-status').textContent = (data.vikunja?.status || 'unknown').toUpperCase();
    }

    async function saveBlueBubbles() {
      const url = document.getElementById('bb-url').value;
      const pw = document.getElementById('bb-password').value;
      document.getElementById('bb-save-status').textContent = 'Testing connection...';
      try {
        const r = await fetch(`${SERVER}/settings/integrations`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({integration: 'imessage', config: {url, password: pw}})
        });
        const d = await r.json();
        document.getElementById('bb-save-status').textContent = d.ok ? '✓ Connected!' : '✗ ' + (d.error || 'Failed');
        document.getElementById('bb-save-status').style.color = d.ok ? '#4f4' : '#f44';
        if (d.ok) refreshStatus();
      } catch (e) {
        document.getElementById('bb-save-status').textContent = '✗ Server unreachable';
      }
    }

    async function saveVikunja() {
      const url = document.getElementById('vk-url').value;
      const token = document.getElementById('vk-token').value;
      document.getElementById('vk-save-status').textContent = 'Testing connection...';
      try {
        const r = await fetch(`${SERVER}/settings/integrations`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({integration: 'vikunja', config: {url, token}})
        });
        const d = await r.json();
        document.getElementById('vk-save-status').textContent = d.ok ? '✓ Connected!' : '✗ ' + (d.error || 'Failed');
        document.getElementById('vk-save-status').style.color = d.ok ? '#4f4' : '#f44';
        if (d.ok) refreshStatus();
      } catch (e) {
        document.getElementById('vk-save-status').textContent = '✗ Server unreachable';
      }
    }

    async function checkVersion() {
      document.getElementById('version-info').textContent = 'Checking...';
      try {
        const r = await fetch(`${SERVER}/device/version`);
        const d = await r.json();
        document.getElementById('version-info').textContent = `Version: ${d.version} (${d.commit})`;

        if (d.update_available) {
          document.getElementById('update-available').style.display = 'block';
          document.getElementById('up-to-date').style.display = 'none';
          document.getElementById('update-msg').textContent = `${d.behind} update(s) available`;
        } else {
          document.getElementById('update-available').style.display = 'none';
          document.getElementById('up-to-date').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('version-info').textContent = '✗ Cannot reach device';
      }
    }

    async function startUpdate(target) {
      document.getElementById('update-status').textContent = 'Updating... (30-60 seconds)';
      const updateButton = document.getElementById('update-button');
      updateButton.disabled = true;
      try {
        const r = await fetch(`${SERVER}/device/update`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({target, confirmed: true})
        });
        const d = await r.json();
        if (d.ok) {
          document.getElementById('update-status').textContent = `✓ Updated to ${d.new_commit}`;
          setTimeout(checkVersion, 5000);
        } else {
          document.getElementById('update-status').textContent = '✗ Update failed — check logs';
        }
      } catch (e) {
        document.getElementById('update-status').textContent = '✗ Connection lost during update (normal — wait 30s)';
        setTimeout(checkVersion, 30000);
      } finally {
        updateButton.disabled = false;
      }
    }

    async function loadDeviceInfo() {
      try {
        const resp = await fetch(`${SERVER}/health`);
        const health = await resp.json();
        document.getElementById('device-info').textContent = `Model: BITOS Pi Zero 2W\nServer: ${SERVER}\nVersion: ${health.version || 'unknown'} (${health.commit || 'unknown'})`;
      } catch (e) {
        document.getElementById('device-info').textContent = 'Device offline';
      }
    }

    refreshStatus();
    checkVersion();
    loadDeviceInfo();
  </script>
</body>
</html>
