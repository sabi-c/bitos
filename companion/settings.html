<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BITOS Companion Settings</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 16px; background: #0d0d0f; color: #f4f4f4; }
      .section { border: 1px solid #3a3a3f; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
      .title { font-weight: 700; margin-bottom: 8px; letter-spacing: .02em; }
      .muted { color: #aaaaaf; font-size: 14px; }
      .draft-item { padding: 8px 0; border-top: 1px solid #2a2a2f; }
      .draft-item:first-child { border-top: 0; }
      button { border: 0; border-radius: 8px; padding: 8px 12px; background: #2f6fff; color: #fff; }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="title">DRAFTS</div>
      <div class="muted">Pending Gmail drafts created from device. Review full content and send from companion or Mac.</div>
      <div class="draft-item">
        <div><strong>Re: Invoice #4821 missing attachment</strong></div>
        <div class="muted">To: Joaquin Rivera • Saved from BITOS</div>
        <button type="button">Open Draft</button>
      </div>
    </div>
  </body>
</html>
