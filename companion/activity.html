<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>BITOS Activity</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* Filter tabs */
    .filter-bar {
      display: flex; gap: 0; width: 100%; max-width: 400px;
      border-bottom: 1px solid #333; margin-bottom: 16px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .filter-tab {
      background: none; color: #555; border: none;
      font-family: monospace; font-size: 10px; font-weight: bold;
      letter-spacing: .04em; padding: 10px 12px;
      cursor: pointer; text-transform: uppercase;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px; white-space: nowrap;
    }
    .filter-tab.active { color: #fff; border-bottom-color: #fff; }

    /* Expanded feed items */
    .feed-item-full {
      padding: 14px 0; border-bottom: 1px solid #1a1a1a;
    }
    .feed-item-full:last-child { border-bottom: none; }
    .feed-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .feed-body {
      font-size: 13px; color: #bbb; line-height: 1.5;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .feed-body.truncated {
      max-height: 60px; overflow: hidden;
      -webkit-mask-image: linear-gradient(#000 60%, transparent);
      mask-image: linear-gradient(#000 60%, transparent);
    }
    .feed-badge {
      display: inline-block; font-size: 9px; letter-spacing: .06em;
      padding: 2px 6px; border: 1px solid #333; color: #888;
      text-transform: uppercase;
    }
    .feed-badge.email { border-color: #447; color: #88f; }
    .feed-badge.message { border-color: #474; color: #8f8; }
    .feed-badge.task { border-color: #774; color: #fa0; }
    .feed-badge.system { border-color: #333; color: #666; }
  </style>
</head>
<body>
  <!-- Status bar injected by nav.js -->
  <div class="page-title">ACTIVITY</div>

  <div class="filter-bar">
    <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">ALL</button>
    <button class="filter-tab" data-filter="message" onclick="setFilter('message')">MESSAGES</button>
    <button class="filter-tab" data-filter="email" onclick="setFilter('email')">EMAIL</button>
    <button class="filter-tab" data-filter="task" onclick="setFilter('task')">TASKS</button>
    <button class="filter-tab" data-filter="system" onclick="setFilter('system')">SYSTEM</button>
  </div>

  <div class="scroll-area" id="activity-list">
    <div class="loading">LOADING</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="js/nav.js"></script>
  <script>
    const SERVER = getServerUrl();
    let allItems = [];
    let activeFilter = 'all';
    let refreshTimer = null;

    // ── Filter tabs ──
    function setFilter(filter) {
      activeFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.filter === filter));
      renderItems();
    }

    // ── Fetch activity ──
    async function fetchActivity() {
      try {
        const r = await fetch(`${SERVER}/activity`, { signal: AbortSignal.timeout(5000) });
        if (!r.ok) throw new Error();
        const data = await r.json();
        allItems = Array.isArray(data) ? data : [];
        renderItems();
      } catch (_) {
        const list = document.getElementById('activity-list');
        if (allItems.length === 0) {
          list.innerHTML = '<div class="empty-state">Cannot reach server</div>';
        }
      }
    }

    // ── Render ──
    function renderItems() {
      const list = document.getElementById('activity-list');
      const filtered = activeFilter === 'all'
        ? allItems
        : allItems.filter(i => classifyType(i) === activeFilter);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">' +
          (allItems.length === 0 ? 'No activity yet' : 'No ' + activeFilter + ' activity') +
          '</div>';
        return;
      }

      list.innerHTML = '';
      for (const item of filtered) {
        const type = classifyType(item);
        const div = document.createElement('div');
        div.className = 'feed-item-full';

        const title = item.title || item.subject || item.message || item.text || '';
        const body = item.body || item.preview || item.content || '';
        const source = item.source || item.from || item.type || 'system';
        const time = item.time || item.timestamp || item.created_at || '';

        div.innerHTML =
          `<div class="feed-meta">` +
            `<span class="feed-badge ${type}">${esc(source)}</span>` +
            `<span class="feed-time">${timeAgo(time)}</span>` +
          `</div>` +
          `<div class="feed-title" style="font-size:13px;color:#ddd;margin-bottom:4px">${esc(title)}</div>` +
          (body ? `<div class="feed-body truncated">${esc(body)}</div>` : '');

        // Tap to expand
        if (body) {
          div.style.cursor = 'pointer';
          div.onclick = () => {
            const bodyEl = div.querySelector('.feed-body');
            if (bodyEl) bodyEl.classList.toggle('truncated');
          };
        }

        list.appendChild(div);
      }
    }

    function classifyType(item) {
      const src = (item.source || item.type || '').toLowerCase();
      if (src.includes('mail') || src.includes('gmail') || src.includes('email')) return 'email';
      if (src.includes('message') || src.includes('imessage') || src.includes('chat') || src.includes('sms')) return 'message';
      if (src.includes('task') || src.includes('vikunja') || src.includes('todo')) return 'task';
      return 'system';
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Init ──
    fetchActivity();
    refreshTimer = setInterval(fetchActivity, 10000);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { clearInterval(refreshTimer); }
      else { fetchActivity(); refreshTimer = setInterval(fetchActivity, 10000); }
    });
  </script>
</body>
</html>
