<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BITOS Crypto Known Vector</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; }
      .pass { color: #0b7a0b; }
      .fail { color: #b00020; }
      code { background: #f3f3f3; padding: 0.1rem 0.3rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Crypto Parity Known Vector</h1>
    <p>Validates JS <code>deriveBleSecret("0000", "DESKTOP-DEV-001")</code> against Python PBKDF2 output.</p>
    <p id="result">Running…</p>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
    <script src="./js/crypto.js"></script>
    <script src="./js/auth.js"></script>
    <script>
      async function runTest() {
        const EXPECTED = "42edacede1532e7c44cef406185c9ecbd9ceee22bd35f4944560a55de06a6abf";
        const got = await deriveBleSecret("0000", "DESKTOP-DEV-001");
        const ok = got === EXPECTED;
        const el = document.getElementById("result");
        el.className = ok ? "pass" : "fail";
        el.textContent = ok
          ? `PASS: ${got}`
          : `FAIL: got ${got}, expected ${EXPECTED}`;
      }

      runTest();
    </script>
  </body>
</html>
